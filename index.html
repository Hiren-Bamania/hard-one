<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insect Classification</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Remixicon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <div class="container">
        <!-- Left Side -->
        <div class="left-panel">
            <header class="header-left">
                <div class="logo">INSECT</div>
                <div class="search-bar">
                    <i class="ri-search-line"></i>
                    <input type="text" placeholder="Search...">
                </div>
            </header>

            <div class="classification-text">
                Classification
            </div>

            <div class="classification-list">
                <div class="list-item">
                    <div class="item-title">Class:</div>
                    <div class="item-value">Insecta</div>
                </div>
                <div class="list-item">
                    <div class="item-title">Order:</div>
                    <div class="item-value">Coleoptera</div>
                </div>
                <div class="list-item">
                    <div class="item-title">Family:</div>
                    <div class="item-value">Cerambycidae</div>
                </div>
                <div class="list-item">
                    <div class="item-title">Sub-Family:</div>
                    <div class="item-value">Cerambycinae</div>
                </div>
                <div class="list-item">
                    <div class="item-title">Tribe:</div>
                    <div class="item-value">Callicromatini</div>
                </div>
                <div class="list-item">
                    <div class="item-title">Genus:</div>
                    <div class="item-value">Pachyteria</div>
                </div>
            </div>
        </div>

        <!-- Right Side -->
        <div class="right-panel">
            <header class="header-right">
                <nav>
                    <a href="#">Home</a>
                    <a href="#">Shop</a>
                    <a href="#">About</a>
                    <a href="#">Gallery</a>
                    <a href="#">Contact</a>
                </nav>
            </header>

            <div class="content-right">
                <h1 class="title">Pachyteria<br>equestris</h1>

                <div class="info-section">
                    <div class="beetle-icon-box">
                        <i class="ri-bug-line"></i>
                        <span>32 mm</span>
                    </div>
                    <div class="divider"></div>
                    <div class="details-box">
                        <div class="detail-item">
                            <div class="detail-icon-circle">
                                <i class="ri-map-pin-line"></i>
                            </div>
                            <div class="detail-text">
                                <span class="label">Locality:</span>
                                <span class="value">Malaysia</span>
                            </div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-icon-circle">
                                <i class="ri-men-line"></i>
                            </div>
                            <div class="detail-text">
                                <span class="label">Sex:</span>
                                <span class="value">Male</span>
                            </div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-icon-circle">
                                <i class="ri-ruler-line"></i>
                            </div>
                            <div class="detail-text">
                                <span class="label">Size:</span>
                                <span class="value">32 mm / 12 mm</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="price">$5.99</div>

                <div class="toggles">
                    <label class="toggle-item">
                        <div class="toggle-switch"></div>
                        <span>View detailed antennae</span>
                    </label>
                    <label class="toggle-item">
                        <div class="toggle-switch active"></div>
                        <span>View underside</span>
                    </label>
                </div>

                <button class="add-btn">Add to collection</button>
            </div>
        </div>

        <!-- Center Image -->
        <div class="center-image-container">
            <img src="images/insect.png" alt="Beetle in dome" class="beetle-dome">
        </div>
    </div>
</body>
</html>
